# Dev-time compose: runs Next.js + FastAPI side-by-side.
# Production deploys are split: Next.js → Vercel, FastAPI → Railway.
services:
  web:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - .:/app
    ports:
      - "3000:3000"
    command: sh -c "npm install && npm run dev"
    environment:
      - FASTAPI_URL=http://api:8000
      - NEXT_PUBLIC_APP_URL=http://localhost:3000
      - MOCK_AGENTS=${MOCK_AGENTS:-false}
    depends_on:
      - api

  api:
    build: ./fastapi
    working_dir: /app
    volumes:
      - ./fastapi:/app
      - ./src/data:/data
    ports:
      - "8000:8000"
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ANTHROPIC_OPUS_MODEL=${ANTHROPIC_OPUS_MODEL:-claude-opus-4-6}
      - ANTHROPIC_SONNET_MODEL=${ANTHROPIC_SONNET_MODEL:-claude-sonnet-4-6}
      - NEXT_PUBLIC_APP_URL=http://localhost:3000
      - CACHE_DIR=/data/agent-cache
