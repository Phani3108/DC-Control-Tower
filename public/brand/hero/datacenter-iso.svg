<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" role="img" aria-label="Isometric AI data center">
  <title>Isometric data center — 4 row clusters · 2 cooling loops · grid feed</title>
  <defs>
    <linearGradient id="rackGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1A2230"/>
      <stop offset="100%" stop-color="#0B0F14"/>
    </linearGradient>
    <linearGradient id="floorGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A2230" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#0B0F14" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="nodeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E5C38F"/>
      <stop offset="100%" stop-color="#C9A66B"/>
    </linearGradient>
    <radialGradient id="glow">
      <stop offset="0%" stop-color="#C9A66B" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#C9A66B" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Floor (isometric rhombus) -->
  <polygon points="400,80 780,270 400,460 20,270" fill="url(#floorGrad)" stroke="#2A3340" stroke-width="1.5"/>

  <!-- Floor grid -->
  <g stroke="#2A3340" stroke-width="0.6" opacity="0.6">
    <line x1="100" y1="270" x2="400" y2="120"/>
    <line x1="180" y1="310" x2="480" y2="160"/>
    <line x1="260" y1="350" x2="560" y2="200"/>
    <line x1="340" y1="390" x2="640" y2="240"/>
    <line x1="420" y1="430" x2="720" y2="280"/>
    <line x1="700" y1="270" x2="400" y2="120"/>
    <line x1="620" y1="310" x2="320" y2="160"/>
    <line x1="540" y1="350" x2="240" y2="200"/>
    <line x1="460" y1="390" x2="160" y2="240"/>
    <line x1="380" y1="430" x2="80" y2="280"/>
  </g>

  <!-- Row 1: 4 racks -->
  <g>
    <g transform="translate(200,200)">
      <polygon points="0,0 60,-30 60,40 0,70" fill="url(#rackGrad)" stroke="#C9A66B" stroke-width="1"/>
      <polygon points="60,-30 120,0 120,70 60,40" fill="#141A23" stroke="#C9A66B" stroke-width="1"/>
      <polygon points="0,0 60,-30 120,0 60,30" fill="#1A2230" stroke="#C9A66B" stroke-width="0.7"/>
      <g opacity="0.9">
        <rect x="10" y="10" width="40" height="2" fill="#C9A66B"/>
        <rect x="10" y="18" width="40" height="2" fill="#4ADE80">
          <animate attributeName="opacity" values="1;0.3;1" dur="3s" repeatCount="indefinite"/>
        </rect>
        <rect x="10" y="26" width="40" height="2" fill="#C9A66B"/>
        <rect x="10" y="34" width="40" height="2" fill="#C9A66B"/>
        <rect x="10" y="42" width="40" height="2" fill="#60A5FA"/>
        <rect x="10" y="50" width="40" height="2" fill="#C9A66B"/>
      </g>
    </g>
    <g transform="translate(280,160)">
      <polygon points="0,0 60,-30 60,40 0,70" fill="url(#rackGrad)" stroke="#C9A66B" stroke-width="1"/>
      <polygon points="60,-30 120,0 120,70 60,40" fill="#141A23" stroke="#C9A66B" stroke-width="1"/>
      <polygon points="0,0 60,-30 120,0 60,30" fill="#1A2230" stroke="#C9A66B" stroke-width="0.7"/>
      <g opacity="0.9">
        <rect x="10" y="10" width="40" height="2" fill="#C9A66B"/>
        <rect x="10" y="18" width="40" height="2" fill="#C9A66B"/>
        <rect x="10" y="26" width="40" height="2" fill="#4ADE80">
          <animate attributeName="opacity" values="1;0.3;1" dur="2.4s" repeatCount="indefinite"/>
        </rect>
        <rect x="10" y="34" width="40" height="2" fill="#C9A66B"/>
        <rect x="10" y="42" width="40" height="2" fill="#C9A66B"/>
        <rect x="10" y="50" width="40" height="2" fill="#60A5FA"/>
      </g>
    </g>
    <g transform="translate(360,120)">
      <polygon points="0,0 60,-30 60,40 0,70" fill="url(#rackGrad)" stroke="#C9A66B" stroke-width="1"/>
      <polygon points="60,-30 120,0 120,70 60,40" fill="#141A23" stroke="#C9A66B" stroke-width="1"/>
      <polygon points="0,0 60,-30 120,0 60,30" fill="#1A2230" stroke="#C9A66B" stroke-width="0.7"/>
      <g opacity="0.9">
        <rect x="10" y="10" width="40" height="2" fill="#4ADE80">
          <animate attributeName="opacity" values="1;0.3;1" dur="1.8s" repeatCount="indefinite"/>
        </rect>
        <rect x="10" y="18" width="40" height="2" fill="#C9A66B"/>
        <rect x="10" y="26" width="40" height="2" fill="#C9A66B"/>
        <rect x="10" y="34" width="40" height="2" fill="#C9A66B"/>
        <rect x="10" y="42" width="40" height="2" fill="#C9A66B"/>
        <rect x="10" y="50" width="40" height="2" fill="#C9A66B"/>
      </g>
    </g>
  </g>

  <!-- Row 2: 3 racks (offset) -->
  <g>
    <g transform="translate(420,260)">
      <polygon points="0,0 60,-30 60,40 0,70" fill="url(#rackGrad)" stroke="#C9A66B" stroke-width="1"/>
      <polygon points="60,-30 120,0 120,70 60,40" fill="#141A23" stroke="#C9A66B" stroke-width="1"/>
      <polygon points="0,0 60,-30 120,0 60,30" fill="#1A2230" stroke="#C9A66B" stroke-width="0.7"/>
      <g opacity="0.9">
        <rect x="10" y="10" width="40" height="2" fill="#C9A66B"/>
        <rect x="10" y="18" width="40" height="2" fill="#C9A66B"/>
        <rect x="10" y="26" width="40" height="2" fill="#60A5FA"/>
        <rect x="10" y="34" width="40" height="2" fill="#C9A66B"/>
        <rect x="10" y="42" width="40" height="2" fill="#4ADE80">
          <animate attributeName="opacity" values="1;0.4;1" dur="3.2s" repeatCount="indefinite"/>
        </rect>
        <rect x="10" y="50" width="40" height="2" fill="#C9A66B"/>
      </g>
    </g>
    <g transform="translate(500,220)">
      <polygon points="0,0 60,-30 60,40 0,70" fill="url(#rackGrad)" stroke="#C9A66B" stroke-width="1"/>
      <polygon points="60,-30 120,0 120,70 60,40" fill="#141A23" stroke="#C9A66B" stroke-width="1"/>
      <polygon points="0,0 60,-30 120,0 60,30" fill="#1A2230" stroke="#C9A66B" stroke-width="0.7"/>
      <g opacity="0.9">
        <rect x="10" y="10" width="40" height="2" fill="#C9A66B"/>
        <rect x="10" y="18" width="40" height="2" fill="#C9A66B"/>
        <rect x="10" y="26" width="40" height="2" fill="#C9A66B"/>
        <rect x="10" y="34" width="40" height="2" fill="#F4B740"/>
        <rect x="10" y="42" width="40" height="2" fill="#C9A66B"/>
        <rect x="10" y="50" width="40" height="2" fill="#C9A66B"/>
      </g>
    </g>
  </g>

  <!-- Cooling units (CRAC) -->
  <g transform="translate(100,320)">
    <polygon points="0,0 50,-25 50,25 0,50" fill="#2A3340" stroke="#4F7CAC" stroke-width="1.3"/>
    <polygon points="50,-25 100,0 100,50 50,25" fill="#1A2230" stroke="#4F7CAC" stroke-width="1.3"/>
    <polygon points="0,0 50,-25 100,0 50,25" fill="#22304A" stroke="#4F7CAC" stroke-width="1"/>
    <circle cx="50" cy="0" r="8" fill="none" stroke="#60A5FA" stroke-width="1.5">
      <animateTransform attributeName="transform" type="rotate" from="0 50 0" to="360 50 0" dur="4s" repeatCount="indefinite"/>
    </circle>
    <line x1="50" y1="-8" x2="50" y2="8" stroke="#60A5FA" stroke-width="1.5"/>
  </g>

  <!-- Power lines from grid -->
  <g stroke="#C9A66B" stroke-width="1.4" fill="none" stroke-linecap="round">
    <path d="M 40,250 Q 100,260 160,270" stroke-dasharray="4 6">
      <animate attributeName="stroke-dashoffset" values="0;-10" dur="1.5s" repeatCount="indefinite"/>
    </path>
    <path d="M 40,270 Q 100,280 160,290" stroke-dasharray="4 6">
      <animate attributeName="stroke-dashoffset" values="0;-10" dur="1.7s" repeatCount="indefinite"/>
    </path>
    <path d="M 40,290 Q 100,300 160,310" stroke-dasharray="4 6">
      <animate attributeName="stroke-dashoffset" values="0;-10" dur="1.9s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- Grid feed tower -->
  <g transform="translate(15,230)">
    <polygon points="0,0 30,-15 30,45 0,60" fill="#2A3340" stroke="#C9A66B" stroke-width="1"/>
    <circle cx="15" cy="-5" r="4" fill="url(#nodeGrad)"/>
  </g>

  <!-- Ambient glow -->
  <circle cx="420" cy="230" r="160" fill="url(#glow)" opacity="0.5"/>
</svg>
